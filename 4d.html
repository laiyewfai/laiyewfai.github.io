<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4D Number Generator — Singapore Pools</title>
<style>
  :root {
    --bg: #0f0f12;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: rgba(255,255,255,0.4);
    --accent: #c0392b;
    --accent-2: #e74c3c;
    --gold: #f1c40f;
    --silver: #bdc3c7;
    --bronze: #cd7f32;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; width: 100%; }
  .nav { margin-bottom: 1rem; }
  .nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
  .nav a:hover { color: var(--text); }
  h1 { font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .gen-btn {
    display: block; width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; border: none; border-radius: 12px; cursor: pointer;
    transition: all 0.2s; margin-bottom: 2rem;
  }
  .gen-btn:hover { filter: brightness(1.15); }
  .gen-btn:active { transform: scale(0.98); }
  .section { margin-bottom: 1.5rem; }
  .section-title {
    font-size: 0.8rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem;
  }
  .prize-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); padding: 0.85rem 1.25rem; border-radius: 10px;
    margin-bottom: 0.5rem; border: 1px solid var(--border);
    opacity: 0; transform: translateY(8px);
    animation: fadeUp 0.35s ease forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .prize-row .label { font-weight: 600; font-size: 0.95rem; }
  .prize-row .label small { font-weight: 400; color: var(--muted); }
  .prize-row .number {
    font-size: 1.5rem; font-weight: 700; font-family: 'SF Mono', Menlo, monospace;
    letter-spacing: 0.15em;
  }
  .prize-row.gold .number { color: var(--gold); text-shadow: 0 0 10px rgba(241,196,15,0.3); }
  .prize-row.silver .number { color: var(--silver); }
  .prize-row.bronze .number { color: var(--bronze); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .grid .prize-row { margin-bottom: 0; }
  .history { margin-top: 2rem; }
  .history-title { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
  .history-item {
    display: flex; gap: 0.75rem; align-items: center;
    font-size: 0.85rem; color: var(--muted); padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
  }
  .history-item time { font-variant-numeric: tabular-nums; min-width: 5rem; }
  .history-item .nums { font-family: 'SF Mono', Menlo, monospace; color: var(--text); }
  footer { margin-top: 2rem; text-align: center; color: var(--muted); font-size: 0.75rem; }
  footer a { color: var(--muted); }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .prize-row .number { font-size: 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="index.html">← SG Pools Tools</a></div>
  <h1>🎰 4D Number Generator</h1>
  <p class="subtitle">Singapore Pools — random 4-digit numbers (0000–9999)</p>
  <button class="gen-btn" id="genBtn">Generate Numbers</button>
  <div id="results" style="display:none">
    <div class="section">
      <div class="section-title">Top Prizes</div>
      <div class="prize-row gold"><span class="label">🥇 1st Prize</span><span class="number" id="p1">—</span></div>
      <div class="prize-row silver"><span class="label">🥈 2nd Prize</span><span class="number" id="p2">—</span></div>
      <div class="prize-row bronze"><span class="label">🥉 3rd Prize</span><span class="number" id="p3">—</span></div>
    </div>
    <div class="section">
      <div class="section-title">Starters</div>
      <div class="grid" id="starter-grid"></div>
    </div>
    <div class="section">
      <div class="section-title">Consolation</div>
      <div class="grid" id="conso-grid"></div>
    </div>
  </div>
  <div class="history" id="history" style="display:none">
    <div class="section-title">Session History</div>
    <div id="history-list"></div>
  </div>
  <footer>
    For entertainment only. Not affiliated with Singapore Pools.<br>
    <a href="https://laiyewfai.github.io">laiyewfai.github.io</a>
  </footer>
</div>

<script>
(function() {
  'use strict';
  const rand4d = () => String(Math.floor(Math.random() * 10000)).padStart(4, '0');

  function createRow(label, num, cls) {
    const div = document.createElement('div');
    div.className = `prize-row ${cls}`;
    div.style.animationDelay = `${Math.random() * 0.2}s`;
    div.innerHTML = `<span class="label">${label}</span><span class="number">${num}</span>`;
    return div;
  }

  function generate() {
    const all = new Set();
    while (all.size < 23) all.add(rand4d());
    const nums = Array.from(all);

    document.getElementById('p1').textContent = nums[0];
    document.getElementById('p2').textContent = nums[1];
    document.getElementById('p3').textContent = nums[2];

    const starters = nums.slice(3, 13);
    const consos = nums.slice(13, 23);

    const sGrid = document.getElementById('starter-grid');
    sGrid.innerHTML = '';
    starters.forEach((n, i) => sGrid.appendChild(createRow(`S${i+1}`, n, '')));

    const cGrid = document.getElementById('conso-grid');
    cGrid.innerHTML = '';
    consos.forEach((n, i) => cGrid.appendChild(createRow(`C${i+1}`, n, '')));

    document.getElementById('results').style.display = 'block';

    // History
    const history = JSON.parse(localStorage.getItem('4d-history') || '[]');
    const entry = { time: new Date().toLocaleTimeString(), top3: nums.slice(0, 3) };
    history.unshift(entry);
    if (history.length > 10) history.pop();
    localStorage.setItem('4d-history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const history = JSON.parse(localStorage.getItem('4d-history') || '[]');
    if (!history.length) return;
    document.getElementById('history').style.display = 'block';
    list.innerHTML = history.map(h =>
      `<div class="history-item"><time>${h.time}</time><span class="nums">${h.top3.join(' ')}</span></div>`
    ).join('');
  }

  document.getElementById('genBtn').addEventListener('click', generate);
  generate();
  renderHistory();
})();
</script>
</body>
</html>

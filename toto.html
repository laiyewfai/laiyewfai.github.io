<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singapore Toto Generator</title>
<style>
  :root {
    --bg: #0f0c29;
    --grad1: #0f0c29;
    --grad2: #302b63;
    --grad3: #24243e;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f5;
    --muted: rgba(255,255,255,0.4);
    --accent: #f7971e;
    --accent2: #ffd200;

    --b1: linear-gradient(145deg,#f7971e,#ffd200);
    --b2: linear-gradient(145deg,#e74c3c,#f39c12);
    --b3: linear-gradient(145deg,#2ecc71,#27ae60);
    --b4: linear-gradient(145deg,#3498db,#2980b9);
    --b5: linear-gradient(145deg,#9b59b6,#8e44ad);
    --b6: linear-gradient(145deg,#e84393,#fd79a8);
    --bonus: linear-gradient(145deg,#1abc9c,#16a085);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--grad1) 0%, var(--grad2) 50%, var(--grad3) 100%);
    padding: 2rem 1rem;
  }
  .card {
    background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 2rem;
    padding: 3rem 2.5rem; max-width: 640px; width: 100%;
    text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .nav { text-align: left; margin-bottom: 0.5rem; }
  .nav a { color: var(--muted); text-decoration: none; font-size: 0.8rem; }
  .nav a:hover { color: var(--text); }
  h1 { color: #fff; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.75rem; }
  .pick-row {
    display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .pick-btn {
    padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .pick-btn:hover { border-color: var(--accent); color: var(--text); }
  .pick-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a2e; border-color: transparent;
  }
  .ball-grid {
    display: flex; justify-content: center; gap: 0.6rem; margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .ball {
    width: 60px; height: 60px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 800; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .ball.empty { background: rgba(255,255,255,0.06); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); color: rgba(255,255,255,0.15); font-size: 1.8rem; text-shadow: none; }
  .ball.bonus {
    box-shadow: 0 6px 20px rgba(26,188,156,0.4), inset 0 2px 4px rgba(255,255,255,0.3);
    position: relative;
  }
  .ball.bonus::after {
    content: '+1'; position: absolute; top: -8px; right: -8px;
    background: var(--accent); color: #1a1a2e; font-size: 0.6rem; font-weight: 800;
    border-radius: 10px; padding: 1px 5px; line-height: 1.4;
    box-shadow: 0 2px 6px rgba(247,151,30,0.5);
  }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .btn {
    display: inline-block; padding: 0.9rem 3rem; border: none;
    border-radius: 60px; font-size: 1rem; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a2e; box-shadow: 0 4px 20px rgba(247,151,30,0.4);
    transition: all 0.2s ease; letter-spacing: 0.01em;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(247,151,30,0.5); }
  .btn:active { transform: translateY(0); }
  .result-line {
    margin-top: 1.25rem; padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.04); border-radius: 12px;
    border: 1px solid var(--border); min-height: 3.2rem;
    display: flex; align-items: center; justify-content: center; gap: 1rem;
    font-size: 1.1rem;
  }
  .result-label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .result-numbers { color: rgba(255,255,255,0.8); font-weight: 600; font-variant-numeric: tabular-nums; }
  .history { margin-top: 1.5rem; }
  .history-title { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .history-item {
    display: flex; gap: 0.75rem; align-items: center; justify-content: center;
    font-size: 0.8rem; color: var(--muted); padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
  }
  .history-item time { font-variant-numeric: tabular-nums; min-width: 4.5rem; }
  .history-item .nums { font-family: 'SF Mono', Menlo, monospace; color: var(--text); font-size: 0.9rem; }
  .footer { margin-top: 1.5rem; color: var(--muted); font-size: 0.75rem; }
  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem; }
    .ball { width: 50px; height: 50px; font-size: 1.2rem; }
    .ball-grid { gap: 0.4rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="nav"><a href="index.html">← SG Pools Tools</a></div>
  <h1>🀄 Singapore Toto</h1>
  <p class="subtitle">6 numbers • 1–49 • no repeats <span id="qpLabel"></span></p>
  <div class="pick-row">
    <button class="pick-btn active" data-type="ordinary">Ordinary</button>
    <button class="pick-btn" data-type="system7">System 7</button>
    <button class="pick-btn" data-type="system8">System 8</button>
  </div>
  <div class="ball-grid" id="ballGrid">
    <div class="ball empty">?</div><div class="ball empty">?</div>
    <div class="ball empty">?</div><div class="ball empty">?</div>
    <div class="ball empty">?</div><div class="ball empty">?</div>
    <div class="ball empty bonus" style="display:none">?</div>
    <div class="ball empty bonus" style="display:none">?</div>
  </div>
  <button class="btn" id="generateBtn">🎰 Generate Numbers</button>
  <div class="result-line">
    <span class="result-label">Sorted</span>
    <span class="result-numbers" id="sortedDisplay">—</span>
  </div>
  <div class="history" id="historySection" style="display:none">
    <div class="history-title">Session History</div>
    <div id="historyList"></div>
  </div>
  <p class="footer">This page runs entirely in your browser — no server, no tracking.</p>
</div>

<script>
(function() {
  'use strict';
  const balls = document.querySelectorAll('.ball');
  const bonusBalls = document.querySelectorAll('.ball.bonus');
  const sortedDisplay = document.getElementById('sortedDisplay');
  const pickBtns = document.querySelectorAll('.pick-btn');

  let currentType = 'ordinary';

  const BALL_COLORS = [
    'linear-gradient(145deg,#f7971e,#ffd200)',
    'linear-gradient(145deg,#e74c3c,#f39c12)',
    'linear-gradient(145deg,#2ecc71,#27ae60)',
    'linear-gradient(145deg,#3498db,#2980b9)',
    'linear-gradient(145deg,#9b59b6,#8e44ad)',
    'linear-gradient(145deg,#e84393,#fd79a8)',
    'linear-gradient(145deg,#1abc9c,#16a085)',
    'linear-gradient(145deg,#1abc9c,#16a085)',
  ];

  function getPickCount(type) {
    return type === 'system7' ? 7 : type === 'system8' ? 8 : 6;
  }

  function generate() {
    const count = getPickCount(currentType);
    const s = new Set();
    while (s.size < count) s.add(Math.floor(Math.random() * 49) + 1);
    const raw = [...s];
    const main = raw.slice(0, 6);   // first 6 are main numbers
    const additional = raw.slice(6); // any beyond 6

    // Show/hide bonus balls
    const allBalls = document.querySelectorAll('.ball');
    allBalls.forEach((b, i) => {
      if (i < 6) {
        b.style.display = 'flex';
        b.textContent = main[i];
        b.classList.remove('empty');
        b.style.background = BALL_COLORS[i];
      } else if (i === 6 && additional.length >= 1) {
        b.style.display = 'flex';
        b.textContent = additional[0];
        b.classList.remove('empty');
        b.style.background = BALL_COLORS[6];
      } else if (i === 7) {
        b.style.display = 'none';
      }
    });

    // Animate
    allBalls.forEach((b, i) => {
      b.style.animation = 'none';
      b.offsetHeight;
    });
    allBalls.forEach((b, i) => {
      b.style.animation = `pop 0.35s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.07}s both`;
    });

    // Sorted display
    const sorted = [...main].sort((a, b) => a - b);
    let sortedText = sorted.join(' · ');
    if (additional.length >= 1) sortedText += ` [+${additional[0]}]`;
    sortedDisplay.textContent = sortedText;

    // History
    const history = JSON.parse(localStorage.getItem('toto-history') || '[]');
    const entry = {
      time: new Date().toLocaleTimeString(),
      type: currentType,
      nums: main.join(' '),
      additional: additional.length >= 1 ? additional[0] : null
    };
    history.unshift(entry);
    if (history.length > 10) history.pop();
    localStorage.setItem('toto-history', JSON.stringify(history));
    renderHistory();
  }

  function updateQpLabel(type) {
    const label = document.getElementById('qpLabel');
    const count = getPickCount(type);
    label.textContent = `· ${type === 'system7' ? 'System 7' : type === 'system8' ? 'System 8' : `${count} picks`}`;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const history = JSON.parse(localStorage.getItem('toto-history') || '[]');
    if (!history.length) return;
    document.getElementById('historySection').style.display = 'block';
    list.innerHTML = history.map(h =>
      `<div class="history-item"><time>${h.time}</time>
        <span class="nums">${h.nums}${h.additional ? ` [+${h.additional}]` : ''}</span>
        <span style="color:var(--muted);font-size:0.7rem">${h.type === 'system7' ? 'S7' : h.type === 'system8' ? 'S8' : ''}</span></div>`
    ).join('');
  }

  // Pick type buttons
  pickBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      pickBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      updateQpLabel(currentType);
      generate();
    });
  });

  document.getElementById('generateBtn').addEventListener('click', generate);
  updateQpLabel('ordinary');
  generate();
  renderHistory();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Pools Tools — 4D & Toto</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card-bg: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --muted: rgba(255,255,255,0.4);
      --accent: #f7971e;
      --accent-2: #ffd200;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .hero { text-align: center; margin-bottom: 2.5rem; }
    .hero h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    .hero p { color: var(--muted); font-size: 0.95rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; max-width: 640px; width: 100%; }
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 1.5rem; padding: 2rem; text-align: center;
      transition: transform 0.2s, border-color 0.2s; cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .card .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .card p { color: var(--muted); font-size: 0.85rem; }
    footer { margin-top: 3rem; color: var(--muted); font-size: 0.75rem; text-align: center; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🎰 SG Pools Tools</h1>
    <p>Quick number generators for Singapore Pools games</p>
  </div>
  <div class="cards">
    <a href="4d.html" class="card">
      <div class="icon">🔢</div>
      <h2>4D Generator</h2>
      <p>Random 4-digit numbers (0000–9999)<br>Top 3 • Starters • Consolation</p>
    </a>
    <a href="toto.html" class="card">
      <div class="icon">🀄</div>
      <h2>Toto Generator</h2>
      <p>6/49 + Additional Number<br>QuickPick options & history</p>
    </a>
  </div>
  <footer>For entertainment only. Not affiliated with Singapore Pools.</footer>
</body>
</html>
